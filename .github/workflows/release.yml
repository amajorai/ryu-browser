# GENERATED by tools/mirror-satellites.sh — edit there, not here.
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.0.6)'
        required: true

permissions:
  contents: write

jobs:
  notes:
    name: Release notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The changelog diffs against the previous tag — needs full history.
          fetch-depth: 0
      - name: Publish release with standardized notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          # Notes are built into a file rather than passed as a multi-line
          # --notes string: inside a `run: |` block scalar EVERY line must stay
          # indented, and a quoted string continuing at column 0 silently ends
          # the block and makes the whole workflow file invalid.
          if [ -f scripts/release-notes.mjs ]; then
            node scripts/release-notes.mjs --tag "$TAG" --channel release --repo "$GITHUB_REPOSITORY" > release-notes.md
          else
            {
              printf '## %s\n\n' "$TAG"
              printf '`%s` at %s.\n\n' "browser" "$TAG"
              printf 'Binaries for every platform are attached to this release.\n'
              printf 'Ryu as a whole lives at https://github.com/amajorai/ryu.\n'
            } > release-notes.md
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" --title "ryu-browser $TAG" --target "$GITHUB_SHA" --notes-file release-notes.md
          fi

  build:
    needs: notes
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Package the Electron sidecar
        working-directory: sidecar
        # shell: bash is REQUIRED — on windows-latest the default is PowerShell,
        # which chokes on `set -euo pipefail` with
        # "A parameter cannot be found that matches parameter name 'euo'".
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GYP_MSVS_VERSION: "2022"
          npm_config_msvs_version: "2022"
        run: |
          set -euo pipefail
          bun install
          # electron-builder derives executableName from the package name
          # (@ryu/browser-sidecar), which is not a legal file name — it fails with
          # "executableName contains characters that cannot be safely used in file
          # paths". Override it explicitly.
          bun run dist -- --publish never -c.executableName=ryu-browser-sidecar
      - name: Collect installers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          find sidecar -type f \
            \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.exe" -o -name "*.zip" \) \
            -not -path "*/node_modules/*" -not -path "*unpacked*" -exec cp {} out/ \; || true
          ls -la out || true
      # gh release upload, NOT softprops: softprops PATCHes the release even
      # when it is only ADDING assets, and that PATCH is refused for the App
      # token ("Resource not accessible by integration") despite Contents:
      # write. The assets endpoint on its own is permitted.
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(out/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no files matched" >&2; exit 0
          fi
          gh release upload "$TAG" "${files[@]}" --clobber
