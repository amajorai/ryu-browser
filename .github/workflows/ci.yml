# GENERATED by tools/mirror-satellites.sh — edit there, not here.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - name: Validate manifests
        run: |
          set -euo pipefail
          find ui -name '*.json' -not -path '*/node_modules/*' -print0 |
            while IFS= read -r -d '' f; do
              python3 -m json.tool "$f" > /dev/null || { echo "invalid JSON: $f" >&2; exit 1; }
            done
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Sidecar tests
        run: |
          set -euo pipefail
          cd sidecar
          if grep -q '"workspace:' package.json; then
            echo "workspace deps present — sidecar tests need the monorepo, skipping" >&2
            exit 0
          fi
          bun install
          bun run test
