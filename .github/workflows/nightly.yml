# GENERATED by tools/mirror-satellites.sh — edit there, not here.
name: nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - name: Reset the rolling nightly prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release delete nightly --yes --cleanup-tag || true
          {
            printf '## Nightly build `%s`\n\n' "${GITHUB_SHA:0:7}"
            printf 'Rolling **nightly** build of `ryu-browser` from `main` — not a stable release.\n\n'
            printf 'Built from commit %s.\n\n' "${GITHUB_SHA}"
            printf 'Installed Ryu nodes never auto-update onto rolling builds; the updater only\n'
            printf 'tracks the latest tagged v* release. Use the tagged releases for anything real.\n'
          } > notes.md
          gh release create nightly --prerelease --target "$GITHUB_SHA" \
            --title "Nightly (${GITHUB_SHA:0:7})" --notes-file notes.md

  build:
    needs: prepare
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.5
      - name: Package the Electron sidecar
        working-directory: sidecar
        # shell: bash is REQUIRED — on windows-latest the default is PowerShell,
        # which chokes on `set -euo pipefail` with
        # "A parameter cannot be found that matches parameter name 'euo'".
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GYP_MSVS_VERSION: "2022"
          npm_config_msvs_version: "2022"
        run: |
          set -euo pipefail
          bun install
          # electron-builder derives executableName from the package name
          # (@ryu/browser-sidecar), which is not a legal file name — it fails with
          # "executableName contains characters that cannot be safely used in file
          # paths". Override it explicitly.
          bun run dist -- --publish never -c.executableName=ryu-browser-sidecar
      - name: Collect installers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          find sidecar -type f \
            \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.exe" -o -name "*.zip" \) \
            -not -path "*/node_modules/*" -not -path "*unpacked*" -exec cp {} out/ \; || true
          ls -la out || true
      # gh release upload, NOT softprops: softprops PATCHes the release even
      # when it is only ADDING assets, and that PATCH is refused for the App
      # token ("Resource not accessible by integration") despite Contents:
      # write. The assets endpoint on its own is permitted.
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: nightly
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(out/*)
          if [ ${#files[@]} -eq 0 ]; then
            # Fail loudly: this build always produces installers, so an empty
            # match is a genuine packaging failure — never a legitimate skip.
            # (`exit 0` here once let a release ship with no assets.)
            echo "no files matched" >&2; exit 1
          fi
          gh release upload "$TAG" "${files[@]}" --clobber
